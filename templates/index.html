<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Checker - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero {
            background: white;
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .feature-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1 class="display-4 mb-4">CC Checker Bot</h1>
            <p class="lead">Professional credit card checker with advanced features</p>
            <hr class="my-4">
            <div class="row mt-5">
                <div class="col-md-4">
                    <div class="feature-icon">🚀</div>
                    <h5>Fast Checking</h5>
                    <p>High-speed card validation with multiple gateways</p>
                </div>
                <div class="col-md-4">
                    <div class="feature-icon">🛡️</div>
                    <h5>Proxy Support</h5>
                    <p>Automatic proxy rotation and management</p>
                </div>
                <div class="col-md-4">
                    <div class="feature-icon">📊</div>
                    <h5>Bulk Processing</h5>
                    <p>Check multiple cards at once with file upload</p>
                </div>
            </div>
            <a href="/login" class="btn btn-primary btn-start">Get Started</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
